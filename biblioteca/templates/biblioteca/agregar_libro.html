{% extends 'biblioteca/base.html' %}

{% block content %}
    <h3>Cargar un nuevo libro al catálogo</h3>
    
    <!-- ACÁ va el permiso, en el formulario principal -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar Libro</button>
    </form>
{% endblock %}
