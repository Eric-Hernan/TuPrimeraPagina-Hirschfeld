{% extends 'biblioteca/base.html' %}

{% block content %}
    <h1>{{ libro.titulo }}</h1>
    {% if libro.imagen %}
        <img src="{{ libro.imagen.url }}" style="max-width: 400px;">
    {% endif %}
    
    <div style="margin-top: 20px;">
        {{ libro.sinopsis|safe }}
    </div>

    <hr>
    <p>Autor: {{ libro.autor }} | Fecha: {{ libro.fecha_publicacion }}</p>

    <!-- Solo mostramos editar/borrar si está logueado -->
    {% if user.is_authenticated %}
        <a href="{% url 'editar_libro' libro.pk %}">Editar</a> | 
        <a href="{% url 'borrar_libro' libro.pk %}" style="color: red;">Borrar</a>
    {% endif %}
    
    <br><br>
    <a href="{% url 'lista_libros' %}">Volver al listado</a>
{% endblock %}
